{% extends "base.html" %}
{% block content %}

<!-- Home Page -->
<div id="home" class="page active">
    <h2 class="page-title">Bem-vindo à Wiki Pessoal</h2>
    <div class="search-container">
        <input
        type="text"
        class="search-box"
        placeholder="Pesquisar por conteúdo ou tags..."
        oninput="search_documents(this.value)"
        >
    </div>
    <div id="documents-container" class="documents-grid">
        {% if docs_list %}
            {% for doc in docs_list %}
                <a href="/document?doc_title={{ doc[0] }}">
                    <div class="document-card">
                        <div class="document-title">{{ doc[0] }}</div>
                        <div class="document-tags">
                            {% if doc[1] %}
                            {% for tag in doc[1] %}
                            <span class="tag">{{ tag }}</span>
                            {% endfor %}   
                            {% endif %}    
                        </div>
                        <div class="hidden">{{ doc[2] }}</div>
                    </div>
                </a>
            {% endfor %}
        {% endif %}
    </div>
</div>

{% endblock %}
